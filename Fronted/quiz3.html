<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizVerse | Live Quiz</title>
    <link rel="stylesheet" href="quiz_css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Main Container -->
    <div class="quiz-page">
        <!-- Header -->
        <header class="quiz-header">
    <!-- Left -->
    <div class="header-left">
        <div class="logo">
            <div class="logo-icon">
                Q
            </div>
            <h2>QuizVerse</h2>
        </div>
        <div class="live-badge">
            <span class="live-dot"></span>
            LIVE QUIZ
        </div>
        <div class="quiz-title">
            Advanced Web Technologies
        </div>
    </div>
    <!-- Center -->
    <div class="header-center">
        <div class="timer-box">
            <i class="fa-regular fa-clock"></i>
            <span id="quizTimer">
                20:00
            </span>
        </div>
        <div class="question-progress">
            <span id="currentQuestion">
                1
            </span>
            /
            <span id="totalQuestions">
                20
            </span>
        </div>
        <div class="progress-line">
            <div class="progress-fill"></div>
        </div>
    </div>
    <!-- Right -->
    <div class="header-right">
        <button class="header-btn">
            <i class="fa-solid fa-expand"></i>
        </button>
        <button class="header-btn">
            <i class="fa-solid fa-sun"></i>
        </button>
        <button class="exit-btn">
            <i class="fa-solid fa-xmark"></i>
            Exit
        </button>
    </div>
</header>

        <!-- Main Layout -->
        <main class="quiz-layout">

            <!-- Left -->
            <section class="quiz-section">
    <div class="question-card">
        <div class="question-top">
            <div class="question-number">
                QUESTION <span id="questionNo">01</span>
            </div>

            <span class="tag category">
    <i class="fa-solid fa-book"></i>
    <span id="questionCategory"></span>
</span>

<span class="tag difficulty">
    <i class="fa-solid fa-circle"></i>
    <span id="questionDifficulty"></span>
</span>

<span class="tag marks">
    <i class="fa-solid fa-star"></i>
    <span id="questionMarks"></span>
</span>
        </div>

        <h1 class="question-text" id="questionText">
            Which of the following methods is used to create a shallow copy of an array in JavaScript?
        </h1>

        <div class="options-grid">
            <button class="option-card">
                <div class="option-letter">A</div>
                <span>Array.prototype.deepCopy()</span>
            </button>

            <button class="option-card">
                <div class="option-letter">B</div>
                <span>Array.prototype.slice()</span>
            </button>

            <button class="option-card">
                <div class="option-letter">C</div>
                <span>Array.prototype.clone()</span>
            </button>

            <button class="option-card">
                <div class="option-letter">D</div>
                <span>Array.prototype.duplicate()</span>
            </button>
        </div>
    </div>

    <div class="quiz-footer">

        <button class="footer-btn previous">
            <i class="fa-solid fa-arrow-left"></i>
            Previous
        </button>

        <button class="footer-btn next">
            Next
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <button class="footer-btn review">
            <i class="fa-solid fa-flag"></i>
            Review
        </button>

        <button class="footer-btn clear">
            <i class="fa-solid fa-rotate-left"></i>
            Clear
        </button>

        <button class="footer-btn skip">
            <i class="fa-solid fa-forward"></i>
            Skip
        </button>

        <button class="footer-btn submit">
            <i class="fa-solid fa-check"></i>
            Submit
        </button>

        <button id="finishBtn" class="footer-btn finish">
        <i class="fa-solid fa-flag-checkered"></i>
            Finish Quiz
         </button>

    </div>
</section>

            <!-- Right -->
            <aside class="sidebar">

    <!-- Question Navigator -->

    <div class="sidebar-card">

        <div class="card-header">
            <h3>Question Navigator</h3>
            <span>20 Questions</span>
        </div>

        <div class="navigator-grid">

            <button class="nav-btn current">1</button>
            <button class="nav-btn">2</button>
            <button class="nav-btn">3</button>
            <button class="nav-btn">4</button>
            <button class="nav-btn">5</button>
            <button class="nav-btn">6</button>
            <button class="nav-btn">7</button>
            <button class="nav-btn">8</button>
            <button class="nav-btn">9</button>
            <button class="nav-btn">10</button>
            <button class="nav-btn">11</button>
            <button class="nav-btn">12</button>
            <button class="nav-btn">13</button>
            <button class="nav-btn">14</button>
            <button class="nav-btn">15</button>
            <button class="nav-btn">16</button>
            <button class="nav-btn">17</button>
            <button class="nav-btn">18</button>
            <button class="nav-btn">19</button>
            <button class="nav-btn">20</button>
            <button class="nav-btn">21</button>
            <button class="nav-btn">22</button>
            <button class="nav-btn">23</button>
            <button class="nav-btn">24</button>
            <button class="nav-btn">25</button>
            <button class="nav-btn">26</button>
            <button class="nav-btn">27</button>
            <button class="nav-btn">28</button>
            <button class="nav-btn">29</button>
            <button class="nav-btn">30</button>
    
            
        </div>
        <div class="navigator-legend">
            <div class="legend-item">
                <span class="legend-color answered"></span>
                <p>Answered</p>
            </div>
            <div class="legend-item">
                <span class="legend-color current"></span>
                <p>Current</p>
            </div>
            <div class="legend-item">
                <span class="legend-color review"></span>
                <p>Review</p>
            </div>
            <div class="legend-item">
                <span class="legend-color not-visited"></span>
                <p>Not Visited</p>
            </div>
        </div>
    </div>
    <!-- Progress -->
    
</aside>

        </main>

    </div>

    <script src="quiz3.js"></script>

</body>

</html>
