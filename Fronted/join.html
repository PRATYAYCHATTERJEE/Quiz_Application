<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join QuizVerse Live Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css2/join.css" />
  </head>
  <body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    <div class="particle" style="top: 8%; left: -20px;"></div>
    <div class="particle" style="top: 22%; left: 20%; animation-duration: 13s;"></div>
    <div class="particle" style="top: 62%; left: 45%; animation-duration: 11s;"></div>
    <div class="particle" style="top: 14%; right: 8%; animation-duration: 15s;"></div>
    <div class="particle" style="top: 76%; right: 20%; animation-duration: 12s;"></div>

    <main class="page-shell">
      <section class="join-card" aria-label="Join quiz form">
        <div class="hero-panel">
          <div class="logo-row">
            <div class="logo-icon"><i class="fa-solid fa-brain"></i></div>
            <span>QuizVerse</span>
          </div>

          <div class="hero-content">
            <h1>Join Live Quiz</h1>
            <p>Enter your details to participate in the quiz and start your live challenge instantly.</p>
          </div>

          <div class="status-card">
            <div class="status-row">
              <span class="stats-pill"><span class="status-dot"></span> Connected</span>
              <span class="stats-pill"><i class="fa-solid fa-signal"></i> Live Quiz Ready</span>
            </div>
            <div class="status-row">
              <span class="stats-pill"><i class="fa-solid fa-users"></i> Participants Online</span>
              <strong id="participantCount">245</strong>
            </div>
            <div class="status-row">
              <span class="stats-pill"><i class="fa-regular fa-calendar"></i> Date</span>
              <strong id="currentDate">--</strong>
            </div>
            <div class="status-row">
              <span class="stats-pill"><i class="fa-regular fa-clock"></i> Time</span>
              <strong id="currentTime">--</strong>
            </div>
          </div>
        </div>

        <div class="form-panel">
          <h2>Participant Details</h2>
          <p class="subtext">Secure your place before the countdown begins.</p>

          <form id="joinForm" novalidate>
            <div class="form-grid">
              <div class="field-group">
                <label for="name">Full Name</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-user"></i>
                  <input id="name" name="name" type="text" placeholder="Enter your full name" />
                </div>
                <div class="field-error" id="nameError"></div>
              </div>

              <div class="field-group">
                <label for="department">Department</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-building-columns"></i>
                  <select id="department" name="department">
                    <option value="">Select department</option>
                    <option>CSE</option>
                    <option>CSBS</option>
                    <option>CSE (IoT)</option>
                    <option>AIML</option>
                    <option>EE</option>
                    <option>ME</option>
                    <option>CE</option>
                    <option>CST</option>
                    <option>BCA</option>
                    <option>BBA</option>
                    <option>BCS (DS)</option>
                    <option>BBA (HM)</option>
                  </select>
                </div>
                <div class="field-error" id="departmentError"></div>
              </div>

              <div class="field-group">
                <label for="year">Year</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-graduation-cap"></i>
                  <select id="year" name="year">
                    <option value="">Select year</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                  </select>
                </div>
                <div class="field-error" id="yearError"></div>
              </div>

              <div class="field-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-mobile-screen-button"></i>
                  <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="Enter 10-digit phone number" maxlength="10" />
                </div>
                <div class="field-error" id="phoneError"></div>
              </div>
            </div>

            <button class="submit-btn" id="joinBtn" type="submit">
              <span class="spinner"><i class="fa-solid fa-spinner"></i></span>
              <span class="text">Join Quiz</span>
            </button>
          </form>

          <div class="footer-note">Powered by QuizVerse</div>
        </div>
      </section>
    </main>

    <script src="js2/join.js"></script>
  </body>
</html>
