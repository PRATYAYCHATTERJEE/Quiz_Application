<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join QuizVerse Live Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      :root {
        --bg: #060816;
        --panel: rgba(15, 22, 38, 0.72);
        --panel-strong: rgba(18, 26, 43, 0.92);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f5f7ff;
        --muted: #93a0c3;
        --primary: #7c3aed;
        --secondary: #06b6d4;
        --success: #34d399;
        --danger: #fb7185;
        --shadow: 0 20px 70px rgba(2, 7, 23, 0.6);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        font-family: "Inter", sans-serif;
        color: var(--text);
        overflow-y: auto;
        overflow-x: hidden;
        background:
          radial-gradient(circle at top left, rgba(6, 182, 212, 0.17), transparent 24%),
          radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.2), transparent 28%),
          linear-gradient(125deg, #040712 0%, #0b1124 45%, #060816 100%);
        background-attachment: fixed;
        padding: 40px 0;
      }

      .background-blob,
      .particle {
        position: fixed;
        pointer-events: none;
        filter: blur(70px);
        opacity: 0.22;
      }

      .background-blob {
        border-radius: 50%;
        animation: float 9s ease-in-out infinite;
      }

      .blob-1 {
        width: 320px;
        height: 320px;
        background: var(--secondary);
        top: -120px;
        left: -90px;
      }

      .blob-2 {
        width: 280px;
        height: 280px;
        background: var(--primary);
        bottom: -100px;
        right: -70px;
        animation-delay: -4s;
      }

      .particle {
        width: 8px;
        height: 8px;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        animation: drift 10s linear infinite;
      }

      .page-shell {
        position: relative;
        z-index: 1;
        width: 95%;
        max-width: 1300px;
        margin: 0 auto;
        padding: 0;
        animation: fadeIn 0.8s ease both;
      }

      .join-card {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 24px;
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 32px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
        backdrop-filter: blur(24px);
        box-shadow: var(--shadow);
        overflow: visible;
      }

      .hero-panel {
        padding: 24px;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.16), rgba(6, 182, 212, 0.1));
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .logo-row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .logo-icon {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        box-shadow: 0 14px 30px rgba(6, 182, 212, 0.2);
      }

      .hero-content h1 {
        margin: 24px 0 10px;
        font-size: clamp(2rem, 3.2vw, 2.9rem);
        line-height: 1.08;
      }

      .hero-content p {
        margin: 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .status-card {
        margin-top: 24px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 8px 0;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.2);
      }

      .stats-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 0.95rem;
      }

      .form-panel {
        padding: 24px;
        border-radius: 24px;
        background: rgba(7, 11, 22, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.12);
        display: flex;
        flex-direction: column;
      }

      .form-panel h2 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      .subtext {
        color: var(--muted);
        margin-bottom: 18px;
      }

      .form-grid {
        display: grid;
        gap: 14px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .field-group label {
        color: #dae3ff;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .input-wrap {
        position: relative;
      }

      .input-wrap i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
      }

      .input-wrap input,
      .input-wrap select {
        width: 100%;
        padding: 13px 14px 13px 42px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      .input-wrap input:focus,
      .input-wrap select:focus {
        border-color: rgba(6, 182, 212, 0.7);
        box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.16);
        transform: translateY(-1px);
      }

      .field-error {
        min-height: 16px;
        font-size: 0.86rem;
        color: var(--danger);
        margin-top: 2px;
      }

      .submit-btn {
        position: relative;
        width: 100%;
        margin-top: 6px;
        border: none;
        border-radius: 16px;
        padding: 14px 18px;
        font-size: 1rem;
        font-weight: 700;
        color: white;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary), #8b5cf6 60%, var(--secondary));
        box-shadow: 0 16px 36px rgba(124, 58, 237, 0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        overflow: hidden;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 42px rgba(6, 182, 212, 0.24);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .submit-btn.loading {
        pointer-events: none;
        opacity: 0.9;
      }

      .submit-btn .spinner {
        display: none;
        margin-right: 8px;
        animation: spin 0.8s linear infinite;
      }

      .submit-btn.loading .spinner {
        display: inline-block;
      }

      .submit-btn .text {
        display: inline-block;
      }

      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.28);
        transform: scale(0);
        animation: ripple 0.55s ease-out;
        pointer-events: none;
      }

      .footer-note {
        margin-top: 14px;
        text-align: center;
        font-size: 0.92rem;
        color: var(--muted);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(18px) scale(1.03);
        }
      }

      @keyframes drift {
        0% {
          transform: translate3d(0, 0, 0);
          opacity: 0.1;
        }
        50% {
          opacity: 0.3;
        }
        100% {
          transform: translate3d(120vw, 100vh, 0);
          opacity: 0.1;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes ripple {
        to {
          transform: scale(2.6);
          opacity: 0;
        }
      }

      @media (max-width: 920px) {
        .join-card {
          grid-template-columns: 1fr;
          padding: 24px;
        }

        .hero-panel {
          min-height: auto;
          padding: 20px;
        }

        .form-panel {
          padding: 20px;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 20px 0;
        }

        .page-shell {
          width: 100%;
          padding: 0 12px;
        }

        .join-card {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 18px;
          border-radius: 20px;
        }

        .hero-panel {
          min-height: auto;
          padding: 16px;
          border-radius: 18px;
        }

        .form-panel {
          padding: 16px;
          border-radius: 18px;
        }

        .hero-content h1 {
          font-size: 1.8rem;
          margin: 16px 0 8px;
        }

        .form-panel h2 {
          font-size: 1.3rem;
        }

        .status-card {
          margin-top: 14px;
          padding: 12px 14px;
        }

        .submit-btn {
          width: 100%;
          padding: 13px 16px;
          font-size: 0.95rem;
          margin-top: 4px;
        }

        .footer-note {
          margin-top: 10px;
          font-size: 0.86rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    <div class="particle" style="top: 8%; left: -20px;"></div>
    <div class="particle" style="top: 22%; left: 20%; animation-duration: 13s;"></div>
    <div class="particle" style="top: 62%; left: 45%; animation-duration: 11s;"></div>
    <div class="particle" style="top: 14%; right: 8%; animation-duration: 15s;"></div>
    <div class="particle" style="top: 76%; right: 20%; animation-duration: 12s;"></div>

    <main class="page-shell">
      <section class="join-card" aria-label="Join quiz form">
        <div class="hero-panel">
          <div class="logo-row">
            <div class="logo-icon"><i class="fa-solid fa-brain"></i></div>
            <span>QuizVerse</span>
          </div>

          <div class="hero-content">
            <h1>Join Live Quiz</h1>
            <p>Enter your details to participate in the quiz and start your live challenge instantly.</p>
          </div>

          <div class="status-card">
            <div class="status-row">
              <span class="stats-pill"><span class="status-dot"></span> Connected</span>
              <span class="stats-pill"><i class="fa-solid fa-signal"></i> Live Quiz Ready</span>
            </div>
            <div class="status-row">
              <span class="stats-pill"><i class="fa-solid fa-users"></i> Participants Online</span>
              <strong id="participantCount">245</strong>
            </div>
            <div class="status-row">
              <span class="stats-pill"><i class="fa-regular fa-calendar"></i> Date</span>
              <strong id="currentDate">--</strong>
            </div>
            <div class="status-row">
              <span class="stats-pill"><i class="fa-regular fa-clock"></i> Time</span>
              <strong id="currentTime">--</strong>
            </div>
          </div>
        </div>

        <div class="form-panel">
          <h2>Participant Details</h2>
          <p class="subtext">Secure your place before the countdown begins.</p>

          <form id="joinForm" novalidate>
            <div class="form-grid">
              <div class="field-group">
                <label for="name">Full Name</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-user"></i>
                  <input id="name" name="name" type="text" placeholder="Enter your full name" />
                </div>
                <div class="field-error" id="nameError"></div>
              </div>

              <div class="field-group">
                <label for="department">Department</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-building-columns"></i>
                  <select id="department" name="department">
                    <option value="">Select department</option>
                    <option>CSE</option>
                    <option>CSBS</option>
                    <option>CSE (IoT)</option>
                    <option>AIML</option>
                    <option>EE</option>
                    <option>ME</option>
                    <option>CE</option>
                    <option>CST</option>
                    <option>BCA</option>
                    <option>BBA</option>
                    <option>BCS (DS)</option>
                    <option>BBA (HM)</option>
                  </select>
                </div>
                <div class="field-error" id="departmentError"></div>
              </div>

              <div class="field-group">
                <label for="year">Year</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-graduation-cap"></i>
                  <select id="year" name="year">
                    <option value="">Select year</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                  </select>
                </div>
                <div class="field-error" id="yearError"></div>
              </div>

              <div class="field-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-mobile-screen-button"></i>
                  <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="Enter 10-digit phone number" maxlength="10" />
                </div>
                <div class="field-error" id="phoneError"></div>
              </div>

              
            </div>

            <button class="submit-btn" id="joinBtn" type="submit">
              <span class="spinner"><i class="fa-solid fa-spinner"></i></span>
              <span class="text">Join Quiz</span>
            </button>
          </form>

          <div class="footer-note">Powered by QuizVerse</div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById('joinForm');
      const joinBtn = document.getElementById('joinBtn');
      const participantCount = document.getElementById('participantCount');
      const currentDate = document.getElementById('currentDate');
      const currentTime = document.getElementById('currentTime');

      const fields = {
        name: document.getElementById('name'),
        department: document.getElementById('department'),
        year: document.getElementById('year'),
        phone: document.getElementById('phone'),
        
      };

      const errors = {
        name: document.getElementById('nameError'),
        department: document.getElementById('departmentError'),
        year: document.getElementById('yearError'),
        phone: document.getElementById('phoneError'),
       
      };

      function setError(fieldName, message) {
        errors[fieldName].textContent = message;
      }

      function clearErrors() {
        Object.values(errors).forEach((el) => {
          el.textContent = '';
        });
      }

      function validateForm() {
        let isValid = true;
        clearErrors();

        const name = fields.name.value.trim();
        if (!name) {
          setError('name', 'Name is required.');
          isValid = false;
        }

        if (!fields.department.value) {
          setError('department', 'Please select a department.');
          isValid = false;
        }

        if (!fields.year.value) {
          setError('year', 'Please select a year.');
          isValid = false;
        }

        if (!/^\d{10}$/.test(fields.phone.value)) {
          setError('phone', 'Phone number must be exactly 10 digits.');
          isValid = false;
        }

        

        return isValid;
      }

      function createRipple(event) {
        const button = event.currentTarget;
        const ripple = document.createElement('span');
        const rect = button.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.className = 'ripple';
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${event.clientX - rect.left}px`;
        ripple.style.top = `${event.clientY - rect.top}px`;
        button.appendChild(ripple);
        setTimeout(() => ripple.remove(), 550);
      }

      joinBtn.addEventListener('click', createRipple);

      form.addEventListener('submit', function (event) {
        event.preventDefault();

        if (!validateForm()) {
          return;
        }

        joinBtn.classList.add('loading');
        joinBtn.querySelector('.text').textContent = 'Joining Quiz...';

        setTimeout(() => {
          window.location.href = 'quiz.html';
        }, 1100);
      });

      function updateClock() {
        const now = new Date();
        currentDate.textContent = now.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric'
        });
        currentTime.textContent = now.toLocaleTimeString('en-US', {
          hour: 'numeric',
          minute: '2-digit'
        });
      }

      participantCount.textContent = String(245 + Math.floor(Math.random() * 18));
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
